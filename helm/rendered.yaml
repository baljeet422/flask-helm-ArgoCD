---
# Source: phonebook/templates/secret.yaml
apiVersion: v1
kind: Secret
metadata:
  name: app-secret
type: Opaque
data:
  MYSQL_USER: "Zmxhc2tteXNxbHVzZXI="
  MYSQL_PASSWORD: "Zmxhc2tteXNxbDQ1Ng=="
  MYSQL_ROOT_PASSWORD: "ZGJteXNxbDM0NQ=="
---
# Source: phonebook/templates/configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
data:
  MYSQL_HOST: "phonebook-mysql"
  MYSQL_DATABASE: "flaskmysql"
  REDIS_HOST: "flask-redis"
---
# Source: phonebook/templates/services.yaml
apiVersion: v1
kind: Service
metadata:
  name: flask-app
spec:
  type: ClusterIP
  selector:
    app: flask-app
  ports:
    - port: 8181
